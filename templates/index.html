<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 转 PDF 转换器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
        }
        .upload-area:hover { border-color: #667eea; background: #f0f0ff; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        .upload-text { color: #666; font-size: 16px; margin-bottom: 10px; }
        .upload-hint { color: #999; font-size: 12px; }
        input[type="file"] { display: none; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        #status { text-align: center; margin-top: 20px; color: #666; font-size: 14px; display: none; }
        .error { color: #c33; }
        .success { color: #2a2; }
        .features { margin-top: 30px; padding-top: 30px; border-top: 1px solid #eee; }
        .features h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .features ul { list-style: none; color: #666; font-size: 14px; }
        .features li { padding: 5px 0; padding-left: 20px; position: relative; }
        .features li:before { content: "✓"; position: absolute; left: 0; color: #667eea; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 EPUB 转 PDF 转换器</h1>
        <p class="subtitle">上传 EPUB 文件，自动下载 PDF</p>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传 EPUB 文件</div>
            <div class="upload-hint">支持 .epub 格式，最大 50MB</div>
            <input type="file" id="fileInput" accept=".epub">
        </div>
        <button class="btn" id="convertBtn" disabled>开始转换</button>
        <div id="status"></div>
        <div class="features">
            <h3>✨ 功能特点</h3>
            <ul>
                <li>保留原始字号和行间距</li>
                <li>保留章节结构和排版</li>
                <li>无需安装软件，在线完成</li>
                <li>文件安全，转换后自动删除</li>
            </ul>
        </div>
    </div>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#ddd'; });
        uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.style.borderColor = '#ddd'; if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

        function handleFile(file) {
            if (!file.name.endsWith('.epub')) { showStatus('请选择 EPUB 文件', true); return; }
            selectedFile = file;
            convertBtn.disabled = false;
            convertBtn.textContent = '开始转换：' + file.name;
            statusDiv.style.display = 'none';
        }

        convertBtn.addEventListener('click', () => {
            if (!selectedFile) return;
            convertBtn.disabled = true;
            convertBtn.textContent = '转换中，请稍候...';
            statusDiv.style.display = 'block';
            statusDiv.className = '';
            statusDiv.textContent = '正在上传并转换，请耐心等待...';

            const formData = new FormData();
            formData.append('file', selectedFile);

            fetch('/convert', { method: 'POST', body: formData })
                .then(res => {
                    if (!res.ok) return res.text().then(t => { throw new Error(t); });
                    return res.blob();
                })
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = selectedFile.name.replace('.epub', '.pdf');
                    a.click();
                    URL.revokeObjectURL(url);
                    statusDiv.className = 'success';
                    statusDiv.textContent = '✅ 转换成功！PDF 已开始下载';
                    convertBtn.textContent = '开始转换';
                    convertBtn.disabled = false;
                })
                .catch(err => {
                    statusDiv.className = 'error';
                    statusDiv.textContent = '❌ ' + err.message;
                    convertBtn.textContent = '开始转换';
                    convertBtn.disabled = false;
                });
        });

        function showStatus(msg, isError) {
            statusDiv.style.display = 'block';
            statusDiv.className = isError ? 'error' : '';
            statusDiv.textContent = msg;
        }
    </script>
</body>
</html>
